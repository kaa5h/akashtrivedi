<script>
(function(){
  "use strict";
  var Heerich = (window.Heerich || {}).Heerich;
  var container = document.getElementById('hero');
  if(!Heerich){ container.textContent = 'Engine failed to load.'; return; }

  var CAMERA = { type:'oblique', angle:315, distance:10 };
  var STYLE  = { fill:'var(--fill)', stroke:'var(--stroke-c)', strokeWidth:'var(--stroke-w)' };
  var SVGOPTS = { padding:30, faceAttributes:function(){ return { 'vector-effect':'non-scaling-stroke' }; } };

  var animationId = 0;
  var scene = null;
  var cachedBase = null;

  function rand(min,max){ return min + Math.floor(Math.random()*(max-min+1)); }

  function getGridLayout(){
    var availW = container.clientWidth, availH = container.clientHeight;
    var gridSize = Math.round((availW * scene.gridPct)/100);
    var cols = Math.ceil(availW/gridSize);
    var rows = Math.ceil(availH/gridSize);
    return { availW:availW, availH:availH, gridSize:gridSize, cols:cols, rows:rows };
  }

  function buildBaseEngine(layout, maxDepth){
    var cols = layout.cols, rows = layout.rows;
    var e = new Heerich({ tile:layout.gridSize, camera:CAMERA, gap:0, style:STYLE });
    e.applyGeometry({
      type:'fill',
      bounds:[[0,0,0],[cols,rows,maxDepth]],
      test:function(){ return true; }
    });
    cachedBase = { engine:e, cols:cols, rows:rows, maxDepth:maxDepth };
    return e;
  }

  function buildScene(depths, towerHeights){
    var layout = getGridLayout();
    var rounded = depths.map(function(d){ return Math.round(d); });
    var maxDepth = Math.max.apply(null, rounded.concat([1]));

    if(!cachedBase || cachedBase.cols!==layout.cols || cachedBase.rows!==layout.rows || cachedBase.maxDepth!==maxDepth){
      buildBaseEngine(layout, maxDepth);
    } else {
      cachedBase.engine.setCamera(CAMERA);
    }

    var base = cachedBase.engine;
    var e = Heerich.fromJSON(base.toJSON());
    e.setCamera(CAMERA);
    e.renderOptions.tileW = layout.gridSize;
    e.renderOptions.tileH = layout.gridSize;

    // carve holes (drilling in as depth grows)
    scene.holes.forEach(function(h,i){
      var d = Math.round(depths[i]);
      if(d>0) e.removeGeometry({ type:'box', position:[h.x,h.y,0], size:[h.w,h.h,d] });
    });

    // raise towers inside the recesses
    if(towerHeights && scene.towers){
      scene.towers.forEach(function(tower,idx){
        var cur = Math.round(towerHeights[idx]);
        if(cur<=0) return;
        var holeDepth = Math.round(depths[tower.holeIndex]);
        var clamped = Math.min(cur, holeDepth);
        if(clamped<=0) return;
        var startZ = holeDepth - clamped;
        e.applyGeometry({ type:'box', position:[tower.x,tower.y,startZ], size:[tower.w,tower.h,clamped] });
      });
    }

    return e.toSVG(SVGOPTS);
  }

  function randomizeScene(){
    var gridPct = rand(7,11);
    var availW = container.clientWidth;
    var gridSize = Math.round((availW*gridPct)/100);
    var cols = Math.ceil(availW/gridSize);
    var rows = Math.ceil(container.clientHeight/gridSize);

    var numHoles = rand(3,6);
    var numSmall = rand(3,6);
    var holes = [];

    for(var i=0;i<numHoles;i++){
      var minPct = numHoles===1 ? 0.4 : 0.1;
      var maxPct = numHoles===1 ? 0.7 : 0.6;
      var w = Math.max(2, Math.floor(cols*(minPct+Math.random()*(maxPct-minPct))));
      var h = Math.max(2, Math.floor(rows*(minPct+Math.random()*(maxPct-minPct))));
      var x = Math.floor(Math.random()*Math.max(1,cols-w));
      var y = Math.floor(Math.random()*Math.max(1,rows-h));
      holes.push({ x:x, y:y, w:w, h:h, targetDepth:rand(6,13) });
    }
    for(var s=0;s<numSmall;s++){
      var sw = Math.max(1, Math.floor(cols*(0.05+Math.random()*0.15)));
      var sh = Math.max(1, Math.floor(rows*(0.05+Math.random()*0.15)));
      var sx = Math.floor(Math.random()*Math.max(1,cols-sw));
      var sy = Math.floor(Math.random()*Math.max(1,rows-sh));
      holes.push({ x:sx, y:sy, w:sw, h:sh, targetDepth:rand(4,9) });
    }

    var towers = [];
    holes.forEach(function(h, holeIndex){
      var numTowers = rand(3,6);
      var used = {};
      var tallIdx = rand(0,numTowers-1);
      for(var t=0;t<numTowers;t++){
        var tw = Math.max(1, rand(1, Math.floor(h.w*0.25)));
        var th = Math.max(1, rand(1, Math.floor(h.h*0.25)));
        var margin = Math.max(1, Math.floor(Math.min(h.w,h.h)*0.1));
        var tx = h.x + rand(margin, Math.max(margin, h.w-margin-tw));
        var ty = h.y + rand(margin, Math.max(margin, h.h-margin-th));
        var key = tx+','+ty;
        if(used[key]) continue;
        used[key]=1;
        var isTall = (t===tallIdx);
        var maxH = isTall ? h.targetDepth : Math.floor(h.targetDepth*0.8);
        var targetHeight = rand(Math.floor(h.targetDepth*0.3), maxH);
        towers.push({ x:tx, y:ty, w:tw, h:th, holeIndex:holeIndex, targetHeight:targetHeight });
      }
    });

    cachedBase = null;
    scene = { gridPct:gridPct, holes:holes, towers:towers };
  }

  function animateIn(){
    var id = ++animationId;
    var holeTargets  = scene.holes.map(function(h){ return h.targetDepth; });
    var towerTargets = scene.towers.map(function(t){ return t.targetHeight; });
    var holeDuration=800, holeStagger=200, towerDuration=600, towerStagger=80;
    var startTime = performance.now();
    var holeEnd = holeDuration + (scene.holes.length-1)*holeStagger;
    var towerStart = holeEnd + 200;

    function ease(t){ return t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

    function step(now){
      if(id!==animationId) return;
      var allDone = true;

      var depths = holeTargets.map(function(target,i){
        var el = now - startTime - i*holeStagger;
        if(el<=0){ allDone=false; return 0; }
        if(el>=holeDuration) return target;
        allDone=false; return target*ease(el/holeDuration);
      });
      var towerHeights = towerTargets.map(function(target,i){
        var el = now - startTime - towerStart - i*towerStagger;
        if(el<=0){ allDone=false; return 0; }
        if(el>=towerDuration) return target;
        allDone=false; return target*ease(el/towerDuration);
      });

      container.innerHTML = buildScene(depths, towerHeights).replace('<svg ', '<svg preserveAspectRatio="xMidYMid slice" ');
      if(!allDone) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function init(){ randomizeScene(); animateIn(); }

  container.addEventListener('click', init);
  var rt;
  window.addEventListener('resize', function(){ clearTimeout(rt); rt=setTimeout(init,200); });

  // Palette sync: the parent page posts the current theme colors here so the
  // blocks follow the site's color slider. Updating the CSS variables repaints
  // the live SVG instantly (its fills/strokes reference var(--fill)/var(--stroke-c)).
  function applyColors(p){
    var s = document.documentElement.style;
    if(p.fill)   s.setProperty('--fill',     p.fill);
    if(p.stroke) s.setProperty('--stroke-c', p.stroke);
  }
  try{                                   // first paint via URL hash, if present
    var h = location.hash.slice(1);
    if(h){ var q={}; h.split('&').forEach(function(kv){ var a=kv.split('='); q[a[0]]=decodeURIComponent(a[1]||''); }); applyColors(q); }
  }catch(e){}
  window.addEventListener('message', function(ev){
    var d = ev.data;
    if(d && d.type==='blocksColors') applyColors(d);
  });

  init();                       // first form
  setInterval(init, 8000);      // re-form every 8 seconds
})();
</script>
